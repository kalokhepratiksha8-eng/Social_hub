{% extends "base.html" %}
{% block title %}SnapGram — Sign In{% endblock %}
{% block content %}
<div class="auth-container">
  <div class="auth-card">
    <div class="auth-logo">Social Hub</div>
    <p class="auth-tagline">Sign in to see photos from your friends.</p>

    {% if messages %}
    {% for msg in messages %}
    <div class="form-error">{{ msg }}</div>
    {% endfor %}
    {% endif %}

    <form method="post" class="auth-form">
      {% csrf_token %}
      <input type="text" name="username" placeholder="Username" required autocomplete="username" class="form-input">
      <input type="password" name="password" placeholder="Password" required autocomplete="current-password" class="form-input">
      <button type="submit" class="btn-primary btn-full">Log in</button>
    </form>
  </div>

  <div class="auth-alt">
    Don't have an account? <a href="/register/">Sign up</a>
  </div>
</div>
{% endblock %}
