{% extends "base.html" %}
{% block title %}New Post — SnapGram{% endblock %}
{% block content %}
<div class="create-page">
  <h2 class="page-title">Create New Post</h2>
  <form method="post" enctype="multipart/form-data" class="create-form">
    {% csrf_token %}
    {% if messages %}{% for msg in messages %}<div class="form-error">{{ msg }}</div>{% endfor %}{% endif %}

    <div class="image-upload-area" id="upload-area">
      <input type="file" name="image" id="image-input" accept="image/*" required>
      <div class="upload-placeholder" id="upload-placeholder">
        <svg width="48" height="48" fill="none" stroke="#aaa" stroke-width="1.5" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        <p>Click to select photo</p>
        <span>JPEG, PNG, WebP up to 10MB</span>
      </div>
      <img id="image-preview" style="display:none;width:100%;max-height:400px;object-fit:contain;border-radius:8px">
    </div>

    <textarea name="caption" placeholder="Write a caption…" class="caption-input" rows="3" maxlength="2200"></textarea>
    <div class="form-actions">
      <a href="/" class="btn-outline">Cancel</a>
      <button type="submit" class="btn-primary">Share</button>
    </div>
  </form>
</div>

<script>
document.getElementById('image-input').addEventListener('change', function(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    document.getElementById('upload-placeholder').style.display = 'none';
    const preview = document.getElementById('image-preview');
    preview.src = ev.target.result;
    preview.style.display = 'block';
  };
  reader.readAsDataURL(file);
});
document.getElementById('upload-area').addEventListener('click', function() {
  document.getElementById('image-input').click();
});
</script>
{% endblock %}
